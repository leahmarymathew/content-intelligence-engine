services:
  - type: web
    name: ai-content-intelligence-backend
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-content-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://content-intelligence-engine.vercel.app
      - key: LOG_LEVEL
        value: info
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: ai-content-db
    databaseName: ai_content
    plan: free
